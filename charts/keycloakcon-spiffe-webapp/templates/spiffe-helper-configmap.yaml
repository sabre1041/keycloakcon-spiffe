kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ include "keycloakcon-spiffe-webapp.fullname" . }}-spiffe-helper
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloakcon-spiffe-webapp.labels" . | nindent 4 }}
data:
  helper.conf: |-
    agent_address = "/spiffe-workload-api/spire-agent.sock"
    cmd = ""
    cmd_args = ""
    cert_dir = "/svids"
    renew_signal = ""
    svid_file_name = "svid.pem"
    svid_key_file_name = "svid_key.pem"
    svid_bundle_file_name = "svid_bundle.pem"
    jwt_svids = [{jwt_audience="{{ required "keycloak.issuerURL is required" .Values.keycloak.issuerURL }}", jwt_svid_file_name="jwt.token"}]
    jwt_bundle_file_name  = "jwt_bundle.json"
