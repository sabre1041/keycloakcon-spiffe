<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keycloak / SPIFFE Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 1400px;
            width: 95%;
        }

        .columns {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
        }

        .column {
            flex: 1;
            min-width: 0;
        }

        .logo {
            max-width: 400px;
            width: 100%;
            margin-bottom: 2rem;
        }

        .welcome {
            font-size: 1.2rem;
            color: #b0b0b0;
            margin-bottom: 0.5rem;
        }

        .username {
            font-size: 2rem;
            font-weight: 700;
            color: #4dc9f6;
            word-break: break-all;
        }

        .claims-section {
            margin-top: 2rem;
            text-align: left;
        }

        .claims-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #b0b0b0;
            margin-bottom: 1rem;
            text-align: center;
        }

        .claims-table {
            width: 100%;
            border-collapse: collapse;
        }

        .claims-table td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.85rem;
            vertical-align: top;
        }

        .claims-table td:first-child {
            color: #4dc9f6;
            font-weight: 600;
            white-space: nowrap;
            width: 1%;
        }

        .claims-table td:last-child {
            color: #d0d0d0;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="images/keycloak-logo.png"
             alt="Keycloak Logo"
             class="logo" />
        <p class="welcome">Welcome,</p>
        <p class="username">{username}</p>

        <div class="columns">
            <div class="column">
                <div class="claims-section">
                    <p class="claims-title">SPIFFE SVID Token Claims</p>
                    <table class="claims-table">
                        {#each svidClaims.entrySet}
                        <tr>
                            <td>{it.key}</td>
                            <td>{it.value}</td>
                        </tr>
                        {/each}
                    </table>
                </div>
            </div>
            <div class="column">
                <div class="claims-section">
                    <p class="claims-title">Authenticated User ID Token Claims</p>
                    <table class="claims-table">
                        {#each claims.entrySet}
                        <tr>
                            <td>{it.key}</td>
                            <td>{it.value}</td>
                        </tr>
                        {/each}
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
